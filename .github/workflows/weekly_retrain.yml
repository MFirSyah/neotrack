name: Weekly AI Retraining

on:
  schedule:
    - cron: '0 2 * * 0' # Setiap Minggu jam 02:00 UTC
  workflow_dispatch: # Agar bisa dijalankan manual kalau mau tes

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install tensorflow pandas numpy supabase scikit-learn

      - name: Run Pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          USER_ID: ${{ secrets.USER_ID }}
        run: |
          # Hanya jalankan train_model.py karena logika pembersihan data 
          # sudah digabung di dalamnya
          python scripts/train_model.py
